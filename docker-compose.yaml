services:
  db_upprpo:
    image: postgres:15
    env_file:
      - ./.env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - my-network
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
  migrations:
    build:
      context: ./backend/src/api
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - ./.env
    networks:
      - my-network
    depends_on:
      db_upprpo:
        condition: service_healthy
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - my-network
    command: redis-server --appendonly yes
    volumes:
      - "redis_data:/data"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
  backend_upprpo:
    build:
      context: ./backend/src/api
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src/api/uploads:/app/uploads
    networks:
      - my-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  db_data:
  redis_data:

networks:
  my-network:
    driver: bridge
